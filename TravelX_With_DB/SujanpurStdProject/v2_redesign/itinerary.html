<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Itinerary - TravelX Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .itinerary-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
        }
        .success-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
        }
        .success-icon {
            font-size: 4rem;
            color: var(--secondary);
            margin-bottom: 15px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-size: 1.1rem;
        }
        .detail-row:last-child { border: none; }
        .detail-label { color: var(--text-muted); }
        .detail-val { color: #fff; font-weight: 600; text-align: right; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="nav-brand">Travel<span>X</span> Hub</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="places.html">Places</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-auth" id="navAuth"></div>
    </nav>

    <div class="itinerary-container">
        <div class="success-header">
            <div class="success-icon">✓</div>
            <h1 class="page-title" style="font-size: 2.2rem;">Booking Confirmed!</h1>
            <p style="color: var(--text-muted);">Your dream vacation is locked in. We've sent a confirmation email to you.</p>
        </div>
        
        <h3 style="margin-bottom: 20px; font-weight: 700;">Itinerary Details</h3>
        
        <div id="itineraryDetails">
            <p>Loading details...</p>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="home.html" class="btn btn-outline" style="margin-right: 15px;">Back to Home</a>
            <button class="btn btn-primary" onclick="window.print()">Download PDF</button>
        </div>
    </div>

    <footer>
        <div class="footer-logo">Travel<span>X</span> Hub</div>
        <p>© 2026 TravelX Hub | All Rights Reserved</p>
    </footer>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const booking = JSON.parse(localStorage.getItem('latestBooking') || '{}');
        
        if (booking && booking.fullName) {
            let extraRows = '';
            if (booking.baseCost) {
                extraRows = `
                    <div class="detail-row" style="border-top: 1px dotted rgba(255,255,255,0.2); padding-top: 15px; margin-top: 10px;">
                        <span class="detail-label">Base Cost</span>
                        <span class="detail-val">₹${booking.baseCost.toLocaleString('en-IN')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Addons Added</span>
                        <span class="detail-val">₹${booking.addons.toLocaleString('en-IN')}</span>
                    </div>
                `;
            }

            document.getElementById('itineraryDetails').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Guest Name</span>
                    <span class="detail-val">${booking.fullName}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Destination</span>
                    <span class="detail-val" style="color: var(--primary);">${booking.destination}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Travelers</span>
                    <span class="detail-val">${booking.guests}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Dates</span>
                    <span class="detail-val">${booking.checkIn} to ${booking.checkOut}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Accommodations</span>
                    <span class="detail-val" style="font-size: 0.9em; max-width: 50%; text-align: right;">${booking.roomType}</span>
                </div>
                ${extraRows}
                <div class="detail-row" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                    <span class="detail-label" style="color: #fff; font-weight: bold;">Total Amount Paid</span>
                    <span class="detail-val" style="color: var(--secondary); font-size: 1.3rem;">${booking.total}</span>
                </div>
            `;
        } else {
            document.getElementById('itineraryDetails').innerHTML = `
                <div style="text-align: center; color: var(--text-muted); padding: 30px;">
                    No recent booking found. <a href="destinations.html" style="color: var(--primary);">Explore destinations</a>
                </div>
            `;
        }
    </script>
</body>
</html>

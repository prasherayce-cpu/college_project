<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelX Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="nav-brand">Travel<span>X</span> Hub</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="places.html">Places</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
        <div class="nav-auth" id="navAuth"></div>
    </nav>

    <div class="page-header" style="padding-bottom: 0;">
        <h1 class="page-title">Get In Touch</h1>
        <p class="page-subtitle">We are here to assist you with any inquiries or custom travel requests.</p>
    </div>

    <div class="contact-container" style="margin-top: 30px;">
        <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" class="input-control" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Your Email</label>
                <input type="email" class="input-control" required placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea class="input-control" rows="5" required placeholder="How can we help you?" style="resize: vertical;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="padding: 15px;">Send Message</button>
        </form>
    </div>

    <footer>
        <div class="footer-logo">Travel<span>X</span> Hub</div>
        <p>© 2026 TravelX Hub | All Rights Reserved</p>
    </footer>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>

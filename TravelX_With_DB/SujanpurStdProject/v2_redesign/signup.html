<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TravelX Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }
        .auth-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .auth-logo span { color: var(--primary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="home.html" class="auth-logo">Travel<span>X</span></a>
        <h2 class="mb-1">Create an Account</h2>
        <p class="mb-4" style="color: var(--text-muted)">Join us for unforgettable journeys</p>
        
        <form id="signupForm">
            <div class="input-group" style="text-align: left;">
                <label>Full Name</label>
                <input type="text" class="input-control" id="name" required placeholder="John Doe">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Email Address</label>
                <input type="email" class="input-control" id="email" required placeholder="you@example.com">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" class="input-control" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-full" style="padding: 14px; font-size: 1.05rem;">Sign Up</button>
        </form>
        
        <p class="mt-4" style="margin-top: 20px; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Log in</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const submitBtn = document.querySelector('button[type="submit"]');
            
            // Clear previous messages
            const existingMessage = document.querySelector('.auth-message');
            if (existingMessage) existingMessage.remove();
            
            // Validation
            if (!name || !email || !password) {
                showAuthMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (name.length < 3) {
                showAuthMessage('Name must be at least 3 characters', 'error');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAuthMessage('Please enter a valid email address', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAuthMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAuthMessage('✓ Account created successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    showAuthMessage('❌ ' + (data.message || 'Signup failed'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign Up';
                }
            } catch (error) {
                console.error('Signup error:', error);
                showAuthMessage('❌ Connection error. Make sure backend is running on port 5000.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
        
        // Special function for auth pages
        function showAuthMessage(message, type = 'success') {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'auth-message';
            messageDiv.textContent = message;
            messageDiv.style.cssText = `
                padding: 12px 16px;
                margin-bottom: 20px;
                border-radius: 8px;
                font-weight: 600;
                border-left: 4px solid;
                ${type === 'success' ? 'background: #d4edda; color: #155724; border-color: #28a745;' : 'background: #f8d7da; color: #721c24; border-color: #f5c6cb;'}
            `;
            
            const form = document.getElementById('signupForm');
            form.insertBefore(messageDiv, form.firstChild);
            
            if (type === 'error') {
                setTimeout(() => messageDiv.remove(), 6000);
            }
        }
    </script>
</body>
</html>
